<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Care Transition & Placement Outcome Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<!-- REACT CDN -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#f0f4f8;--surface:#ffffff;--accent:#0077b6;--accent2:#3b82f6;
  --accent3:#d97706;--accent4:#dc2626;--text:#1e293b;--muted:#475569;
  --border:#cbd5e1;
  --grad1:linear-gradient(135deg,#0077b6,#3b82f6);
  --grad2:linear-gradient(135deg,#d97706,#dc2626);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;}
#root{height:100vh;width:100%;position:relative;}

/* LOGIN — Split Screen Design */
.login-bg{height:100vh;width:100%;display:flex;position:relative;overflow:hidden;background:#fff;}
.login-left{flex:1.1;position:relative;overflow:hidden;background:linear-gradient(160deg,#0c4a6e 0%,#0077b6 45%,#0ea5e9 100%);display:flex;flex-direction:column;justify-content:center;padding:60px;}
.login-left::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(255,255,255,.08) 0,transparent 40%),radial-gradient(circle at 80% 70%,rgba(255,255,255,.08) 0,transparent 40%);}
.hosp-illustration{position:absolute;inset:0;opacity:.9;}
.hosp-building{position:absolute;bottom:0;left:0;width:100%;}
.left-content{position:relative;z-index:5;color:#fff;}
.left-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:30px;padding:6px 16px;font-size:11px;font-weight:600;letter-spacing:.5px;margin-bottom:24px;}
.left-title{font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:700;line-height:1.25;margin-bottom:16px;}
.left-sub{font-size:14px;color:#bae6fd;line-height:1.7;max-width:420px;margin-bottom:36px;}
.left-stats{display:flex;gap:32px;}
.left-stat-num{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;}
.left-stat-label{font-size:11px;color:#bae6fd;margin-top:2px;}
.floating-card{position:absolute;background:rgba(255,255,255,.95);border-radius:14px;padding:14px 18px;box-shadow:0 12px 30px rgba(0,0,0,.2);display:flex;align-items:center;gap:10px;z-index:6;animation:floatCard 5s ease-in-out infinite;}
@keyframes floatCard{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.fc1{top:14%;right:8%;animation-delay:0s;}
.fc2{bottom:18%;right:14%;animation-delay:1.5s;}
.fc-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.fc-text-title{font-size:11px;font-weight:700;color:#1e293b;}
.fc-text-sub{font-size:9px;color:#64748b;}

.login-right{flex:1;display:flex;justify-content:center;align-items:center;background:#fff;padding:40px;}
.login-card{width:100%;max-width:380px;}
.login-logo{margin-bottom:32px;}
.login-icon{width:56px;height:56px;background:linear-gradient(135deg,#0077b6,#3b82f6);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 8px 20px rgba(0,119,182,.25);}
.login-icon svg{width:28px;height:28px;}
.login-title{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#0f172a;}
.login-sub{font-size:13px;color:var(--muted);margin-top:6px;}
.field-group{margin-bottom:20px;}
.field-label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px;}
.field-input{width:100%;background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-size:14px;outline:none;transition:all .3s;}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,119,182,.1);background:#fff;}
.err-msg{color:var(--accent4);font-size:12px;margin-bottom:12px;}
.btn-login{width:100%;background:linear-gradient(135deg,#0077b6,#3b82f6);border:none;border-radius:10px;padding:15px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#fff;cursor:pointer;transition:all .3s;letter-spacing:.5px;}
.btn-login:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 20px rgba(0,119,182,.3);}
.login-hint{text-align:center;margin-top:20px;font-size:11px;color:var(--muted);}
.login-hint span{color:#0077b6;font-weight:700;}
@media (max-width:860px){.login-left{display:none;}}

/* SHELL */
.shell{display:flex;height:100vh;width:100%;}
.sidebar{width:220px;background:#1e293b;display:flex;flex-direction:column;padding:24px 0;flex-shrink:0;box-shadow:4px 0 20px rgba(0,0,0,.08);}
.sidebar-logo{padding:0 20px 24px;border-bottom:1px solid rgba(255,255,255,.08);}
.s-icon{width:36px;height:36px;background:var(--grad1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px;}
.s-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:#e0f2fe;line-height:1.3;}
.s-sub{font-size:10px;color:#94a3b8;margin-top:2px;}
.react-badge{display:flex;align-items:center;gap:6px;margin-top:14px;background:rgba(97,218,251,.1);border:1px solid rgba(97,218,251,.35);border-radius:20px;padding:5px 10px;width:fit-content;position:relative;}
.react-badge span:last-child{font-size:10px;font-weight:700;color:#61dafb;letter-spacing:.3px;}
.react-badge svg{animation:spin-react 4s linear infinite;}
@keyframes spin-react{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.react-dot{width:6px;height:6px;border-radius:50%;background:#61dafb;box-shadow:0 0 0 0 rgba(97,218,251,.6);animation:pulse-react 1.6s ease-out infinite;}
@keyframes pulse-react{0%{box-shadow:0 0 0 0 rgba(97,218,251,.6);}70%{box-shadow:0 0 0 8px rgba(97,218,251,0);}100%{box-shadow:0 0 0 0 rgba(97,218,251,0);}}
.nav-list{flex:1;padding:16px 0;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;font-size:12.5px;color:#94a3b8;border-left:3px solid transparent;transition:all .25s;border-radius:0 8px 8px 0;margin:1px 8px 1px 0;}
.nav-item:hover{color:#e2e8f0;background:rgba(255,255,255,.06);}
.nav-item.active{color:#7dd3fc;background:rgba(59,130,246,.15);border-left-color:#3b82f6;font-weight:600;}
.n-icon{font-size:15px;flex-shrink:0;width:20px;text-align:center;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);}
.user-badge{display:flex;align-items:center;gap:10px;}
.user-avatar{width:32px;height:32px;background:var(--grad1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.u-name{font-size:12px;font-weight:600;color:#e2e8f0;}
.u-role{font-size:10px;color:#64748b;}
.btn-logout{background:none;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:4px 8px;color:#94a3b8;font-size:10px;cursor:pointer;}
.btn-logout:hover{color:#fca5a5;border-color:#fca5a5;}

/* MAIN */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0;box-shadow:0 1px 8px rgba(0,0,0,.05);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.page-badge{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;background:#eff6ff;color:#1d4ed8;padding:3px 10px;border-radius:20px;border:1px solid #bfdbfe;}
.page-title-top{font-size:14px;font-weight:600;color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.live-dot{width:8px;height:8px;background:#16a34a;border-radius:50%;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.live-label{font-size:11px;color:var(--muted);}
.date-chip{font-size:11px;color:var(--muted);background:#f8fafc;border:1px solid var(--border);border-radius:6px;padding:4px 10px;}
.content{flex:1;overflow-y:auto;padding:28px;background:var(--bg);}
.page-anim-next{animation:slideInRight .45s cubic-bezier(.22,1,.36,1);}
.page-anim-prev{animation:slideInLeft .45s cubic-bezier(.22,1,.36,1);}
.page-anim-dot{animation:fadeInUp .45s cubic-bezier(.22,1,.36,1);}
@keyframes slideInRight{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-40px);}to{opacity:1;transform:translateX(0);}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.nav-footer{height:56px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:#fff;flex-shrink:0;}
.btn-nav{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:10px 20px;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .25s;}
.btn-nav:hover{background:#eff6ff;border-color:var(--accent);color:var(--accent);}
.btn-nav:disabled{opacity:.35;cursor:not-allowed;}
.btn-nav.primary{background:var(--grad1);border:none;color:#fff;font-weight:600;}
.btn-nav.primary:hover{opacity:.9;transform:translateY(-1px);}
.page-dots{display:flex;gap:6px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:#cbd5e1;transition:all .3s;cursor:pointer;}
.dot.active-dot{background:var(--accent);width:20px;border-radius:4px;}

/* CARDS & GRIDS */
.section-header{margin-bottom:28px;}
.eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:8px;}
.sec-h2{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--text);line-height:1.2;}
.sec-p{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.6;}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px;transition:all .3s;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.card:hover{border-color:#93c5fd;box-shadow:0 4px 16px rgba(0,119,182,.08);}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:14px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.span-2{grid-column:span 2;}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.kpi-top{position:absolute;top:0;left:0;right:0;height:3px;}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;}
.kpi-value{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;color:var(--text);}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.kpi-trend{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;margin-top:8px;}
.trend-up{color:#16a34a;}.trend-down{color:#dc2626;}

/* CONTROLS */
.control-group{margin-bottom:20px;}
.control-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;}
.ctrl-input{width:100%;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;}
.slider-wrap{display:flex;align-items:center;gap:12px;}
.slider-wrap input[type=range]{flex:1;accent-color:var(--accent);}
.slider-val{font-size:12px;font-weight:700;color:var(--accent);min-width:36px;}
.toggle-group{display:flex;flex-direction:column;gap:10px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:12px 16px;}
.toggle-label{font-size:13px;color:var(--text);font-weight:500;}
.toggle-desc{font-size:11px;color:var(--muted);}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;background:#cbd5e1;border-radius:11px;transition:.3s;cursor:pointer;}
.toggle input:checked+.toggle-track{background:var(--accent);}
.toggle-track::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle input:checked+.toggle-track::before{transform:translateX(18px);}
.apply-btn{width:100%;background:var(--grad1);border:none;border-radius:10px;padding:14px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:#fff;cursor:pointer;margin-top:8px;}
.toast{text-align:center;color:#16a34a;font-size:12px;font-weight:600;margin-top:8px;}

/* BAR CHART */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:160px;padding:8px 0 0;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.bar-fill{width:100%;border-radius:6px 6px 0 0;transition:height .8s ease;position:relative;}
.bar-fill:hover{opacity:.8;}
.bar-tip{position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:#1e293b;color:#e2e8f0;border-radius:6px;padding:3px 8px;font-size:10px;white-space:nowrap;pointer-events:none;opacity:0;transition:.2s;}
.bar-fill:hover .bar-tip{opacity:1;}
.bar-label{font-size:9px;color:var(--muted);text-align:center;font-weight:500;}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);border-bottom:2px solid var(--border);background:#f8fafc;}
.data-table td{padding:10px 14px;color:var(--text);border-bottom:1px solid #f1f5f9;}
.data-table tr:hover td{background:#f0f9ff;}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.bg-green{background:#dcfce7;color:#15803d;}
.bg-amber{background:#fef9c3;color:#a16207;}
.bg-red{background:#fee2e2;color:#b91c1c;}
.bg-blue{background:#dbeafe;color:#1d4ed8;}

/* PROJECT INFO */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.info-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.info-card h3{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#1d4ed8;margin-bottom:12px;}
.info-card p,.info-card li{font-size:12.5px;color:var(--muted);line-height:1.7;}
.info-card ul{padding-left:16px;}
.tech-pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.tech-pill{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;}
.wf-step{display:flex;gap:14px;align-items:flex-start;padding:10px 0;border-bottom:1px dashed #e2e8f0;}
.wf-num{width:24px;height:24px;border-radius:50%;background:var(--grad1);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:#fff;}
.wf-text{font-size:12.5px;color:var(--muted);line-height:1.5;}

/* PREDICTION */
.pred-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px;position:relative;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.pred-bg{position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;opacity:.06;}
.pred-icon{font-size:26px;margin-bottom:12px;}
.pred-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px;}
.pred-value{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;margin-bottom:8px;}
.rec-list{list-style:none;display:flex;flex-direction:column;gap:10px;}
.rec-item{display:flex;gap:12px;align-items:flex-start;background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.rec-text{font-size:12.5px;color:var(--muted);line-height:1.5;}
.rec-text strong{color:var(--text);font-weight:600;}
.risk-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #f1f5f9;}
.risk-name{flex:1;font-size:12px;color:var(--text);font-weight:500;}
.risk-bar-wrap{flex:2;background:#f1f5f9;border-radius:20px;height:8px;overflow:hidden;}
.risk-bar{height:100%;border-radius:20px;}
.risk-pct{font-size:11px;font-weight:700;min-width:36px;text-align:right;}

/* LINE CHART */
.line-wrap{position:relative;height:200px;margin-top:12px;}
.line-wrap svg{width:100%;height:100%;}
.sankey-svg{width:100%;overflow:visible;}
.sankey-link{fill:none;stroke-opacity:.3;}
.sankey-label{font-size:11px;fill:#334155;font-family:'Inter',sans-serif;font-weight:500;}
.sankey-val{font-size:9px;fill:#64748b;}

/* ALERT CARDS */
.alert-card{display:flex;align-items:center;justify-content:space-between;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.alert-num{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── DATA HELPERS ──
const depts=['Cardiology','General Med','ICU','Orthopedics','Neurology','Surgery'];
const dests=['Home','SNF','Rehab','Readmit'];
const risks=['Low','Medium','High'];
const diags=['Hypertension','Fracture','Pneumonia','CHF','Stroke','Hip Replacement','Sepsis','Appendicitis'];

function genRows(n){
  const rows=[];
  for(let i=0;i<n;i++){
    const id='PT-'+(String(10000+i).slice(1));
    const age=40+Math.floor(Math.random()*45);
    const gender=Math.random()>.5?'M':'F';
    const dept=depts[Math.floor(Math.random()*depts.length)];
    const diag=diags[Math.floor(Math.random()*diags.length)];
    const los=2+Math.floor(Math.random()*18);
    const adm=new Date(2024,Math.floor(Math.random()*12),1+Math.floor(Math.random()*28));
    const dis=new Date(adm); dis.setDate(dis.getDate()+los);
    const dest=dests[Math.floor(Math.random()*dests.length)];
    const riskI=dest==='Readmit'?2:(los>10?1:Math.floor(Math.random()*2));
    const score=riskI===2?70+Math.floor(Math.random()*30):riskI===1?40+Math.floor(Math.random()*30):Math.floor(Math.random()*40);
    rows.push({id,age,gender,dept,diag,los,adm:adm.toISOString().slice(0,10),dis:dis.toISOString().slice(0,10),dest,risk:risks[riskI],score,readmit:dest==='Readmit'?'Yes':'No',riskI});
  }
  return rows;
}

// ── DNA CANVAS ──
function DNACanvas(){
  const ref=useRef();
  useEffect(()=>{
    const canvas=ref.current; if(!canvas)return;
    const ctx=canvas.getContext('2d');
    let W,H,raf,t=0;
    const CA=['#a855f7','#c084fc','#d946ef'],CB=['#ec4899','#f472b6','#fb7185'];
    const GA='rgba(168,85,247,',GB='rgba(236,72,153,';
    const NODES=18;
    function resize(){W=canvas.width=canvas.offsetWidth||innerWidth;H=canvas.height=canvas.offsetHeight||innerHeight;}
    resize(); window.addEventListener('resize',resize);
    function draw(){
      ctx.clearRect(0,0,W,H);
      [{cx:W*.15,sp:.012,sc:1,al:.7},{cx:W*.5,sp:.010,sc:1.3,al:.5},{cx:W*.82,sp:.014,sc:.9,al:.65}].forEach((cfg,si)=>{
        const amp=38*cfg.sc, sp=H/(NODES-1), ph=t*cfg.sp+(si*Math.PI*.7);
        const pA=[],pB=[];
        for(let i=0;i<NODES;i++){const a=ph+(i/NODES)*Math.PI*4;pA.push({x:cfg.cx+Math.cos(a)*amp,y:sp*i});pB.push({x:cfg.cx+Math.cos(a+Math.PI)*amp,y:sp*i});}
        function strand(pts,C,G){
          ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
          for(let i=1;i<pts.length-1;i++){const mx=(pts[i].x+pts[i+1].x)/2,my=(pts[i].y+pts[i+1].y)/2;ctx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);}
          const g=ctx.createLinearGradient(cfg.cx,0,cfg.cx,H);g.addColorStop(0,C[0]);g.addColorStop(.5,C[1]);g.addColorStop(1,C[2]);
          ctx.strokeStyle=g;ctx.lineWidth=2.5*cfg.sc;ctx.globalAlpha=cfg.al;ctx.shadowBlur=12;ctx.shadowColor=G+'0.6)';ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;
        }
        strand(pA,CA,GA);strand(pB,CB,GB);
        for(let i=0;i<NODES;i++){
          const ax=pA[i].x,ay=pA[i].y,bx=pB[i].x,by=pB[i].y;
          if(Math.abs(ax-bx)>18*cfg.sc){
            ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);
            const rg=ctx.createLinearGradient(ax,ay,bx,by);rg.addColorStop(0,'rgba(168,85,247,.5)');rg.addColorStop(.5,'rgba(236,72,153,.7)');rg.addColorStop(1,'rgba(168,85,247,.5)');
            ctx.strokeStyle=rg;ctx.lineWidth=1.5*cfg.sc;ctx.globalAlpha=cfg.al*.8;ctx.stroke();ctx.globalAlpha=1;
          }
          [pA[i],pB[i]].forEach((p,pi)=>{ctx.beginPath();ctx.arc(p.x,p.y,3.5*cfg.sc,0,Math.PI*2);ctx.fillStyle=pi===0?CA[i%3]:CB[i%3];ctx.globalAlpha=cfg.al;ctx.shadowBlur=10;ctx.shadowColor=(pi===0?GA:GB)+'0.8)';ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;});
        }
      });
      [{x:W*.1,y:H*.2,r:80,c:'rgba(168,85,247,.07)'},{x:W*.85,y:H*.15,r:100,c:'rgba(236,72,153,.06)'},{x:W*.5,y:H*.8,r:120,c:'rgba(139,92,246,.05)'},{x:W*.3,y:H*.6,r:70,c:'rgba(244,114,182,.06)'}].forEach(o=>{
        const w=Math.sin(t*.008+o.r)*12,g=ctx.createRadialGradient(o.x,o.y+w,0,o.x,o.y+w,o.r);
        g.addColorStop(0,o.c.replace('.0','.1'));g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.beginPath();ctx.arc(o.x,o.y+w,o.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      });
      t++;raf=requestAnimationFrame(draw);
    }
    draw();
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={ref} id="dna-canvas"/>;
}

// ── DONUT CHART ──
function DonutChart({data,size=180,thickness=26,centerLabel,centerValue}){
  const total=data.reduce((s,d)=>s+d.val,0);
  let cumulative=0;
  const r=(size-thickness)/2;
  const cx=size/2,cy=size/2;
  const circumference=2*Math.PI*r;
  const [hovered,setHovered]=useState(null);
  return(
    <div style={{display:'flex',alignItems:'center',gap:24,flexWrap:'wrap'}}>
      <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:'rotate(-90deg)'}}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f1f5f9" strokeWidth={thickness}/>
          {data.map((d,i)=>{
            const frac=d.val/total;
            const dash=frac*circumference;
            const offset=circumference-((cumulative/total)*circumference);
            cumulative+=d.val;
            return(
              <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color}
                strokeWidth={hovered===i?thickness+4:thickness}
                strokeDasharray={`${dash} ${circumference-dash}`}
                strokeDashoffset={offset}
                style={{transition:'stroke-width .25s, stroke-dashoffset 1s ease, stroke-dasharray 1s ease',cursor:'pointer'}}
                onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}
              />
            );
          })}
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <div style={{fontFamily:'Space Grotesk',fontSize:24,fontWeight:700,color:'#1e293b'}}>
            {hovered!==null?`${data[hovered].val}`:centerValue}
          </div>
          <div style={{fontSize:10,color:'#64748b',textAlign:'center',maxWidth:size*0.6}}>
            {hovered!==null?data[hovered].label:centerLabel}
          </div>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8,flex:1,minWidth:140}}>
        {data.map((d,i)=>(
          <div key={i} onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}
            style={{display:'flex',alignItems:'center',gap:8,fontSize:12,cursor:'pointer',opacity:hovered!==null&&hovered!==i?.5:1,transition:'opacity .2s'}}>
            <span style={{width:10,height:10,borderRadius:3,background:d.color,flexShrink:0}}/>
            <span style={{color:'#475569',flex:1}}>{d.label}</span>
            <span style={{fontWeight:700,color:'#1e293b'}}>{((d.val/total)*100).toFixed(1)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── ANIMATED COUNTER ──
function AnimatedCounter({value,duration=1200,decimals=0,suffix='',prefix=''}){
  const [display,setDisplay]=useState(0);
  const target=parseFloat(value);
  useEffect(()=>{
    let startTime=null;
    let raf;
    function step(ts){
      if(!startTime)startTime=ts;
      const progress=Math.min((ts-startTime)/duration,1);
      const eased=1-Math.pow(1-progress,3); // ease-out cubic
      setDisplay(target*eased);
      if(progress<1)raf=requestAnimationFrame(step);
      else setDisplay(target);
    }
    raf=requestAnimationFrame(step);
    return()=>cancelAnimationFrame(raf);
  },[target,duration]);
  return <>{prefix}{display.toFixed(decimals)}{suffix}</>;
}

// ── KPI CARD (with animated counting) ──
function KPICard({label,value,sub,trend,trendUp,topColor}){
  // Parse numeric value + suffix for animation (e.g. "91.3%" -> 91.3, "%")
  const match=String(value).match(/^([\d,]+\.?\d*)(.*)$/);
  const hasNumber=match && !isNaN(parseFloat(match[1].replace(/,/g,'')));
  const numPart=hasNumber?parseFloat(match[1].replace(/,/g,'')):0;
  const suffixPart=hasNumber?match[2]:'';
  const decimals=hasNumber && match[1].includes('.')?1:0;
  const useComma=hasNumber && parseFloat(match[1].replace(/,/g,''))>=1000;
  return(
    <div className="kpi-card">
      <div className="kpi-top" style={{background:topColor||'linear-gradient(90deg,#0077b6,#3b82f6)'}}/>
      <div className="kpi-label">{label}</div>
      <div className="kpi-value">
        {hasNumber?
          <AnimatedCounter value={numPart} decimals={decimals} suffix={suffixPart} prefix={useComma?'':''}/>
          :value}
      </div>
      {sub&&<div className="kpi-sub">{sub}</div>}
      {trend&&<div className={`kpi-trend ${trendUp?'trend-up':'trend-down'}`}>{trendUp?'▲':'▼'} {trend}</div>}
    </div>
  );
}

// ── GAUGE CHART ──
function GaugeChart({value,max=100,label,color='#0077b6',size=180}){
  const [animVal,setAnimVal]=useState(0);
  useEffect(()=>{
    let raf,start=null;
    const dur=1200;
    function step(ts){
      if(!start)start=ts;
      const p=Math.min((ts-start)/dur,1);
      setAnimVal(value*(1-Math.pow(1-p,3)));
      if(p<1)raf=requestAnimationFrame(step);
    }
    raf=requestAnimationFrame(step);
    return()=>cancelAnimationFrame(raf);
  },[value]);
  const pct=Math.min(animVal/max,1);
  const r=size/2-16;
  const circumference=Math.PI*r; // semi-circle
  const cx=size/2,cy=size/2;
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
      <svg width={size} height={size/2+20} viewBox={`0 0 ${size} ${size/2+20}`}>
        <path d={`M 16 ${cy} A ${r} ${r} 0 0 1 ${size-16} ${cy}`} fill="none" stroke="#f1f5f9" strokeWidth="16" strokeLinecap="round"/>
        <path d={`M 16 ${cy} A ${r} ${r} 0 0 1 ${size-16} ${cy}`} fill="none" stroke={color} strokeWidth="16" strokeLinecap="round"
          strokeDasharray={`${circumference*pct} ${circumference}`}/>
      </svg>
      <div style={{marginTop:-8,textAlign:'center'}}>
        <div style={{fontFamily:'Space Grotesk',fontSize:26,fontWeight:700,color}}>{animVal.toFixed(1)}%</div>
        <div style={{fontSize:11,color:'#64748b'}}>{label}</div>
      </div>
    </div>
  );
}

// ── SEARCHABLE + SORTABLE TABLE ──
function SortableSearchableTable({columns,rows,searchKeys,riskColIndex}){
  const [query,setQuery]=useState('');
  const [sortCol,setSortCol]=useState(null);
  const [sortDir,setSortDir]=useState('asc');

  const filtered=rows.filter(r=>{
    if(!query)return true;
    return searchKeys.some(idx=>String(r[idx]).toLowerCase().includes(query.toLowerCase()));
  });

  const sorted=[...filtered].sort((a,b)=>{
    if(sortCol===null)return 0;
    const av=a[sortCol],bv=b[sortCol];
    const an=parseFloat(String(av).replace(/[^0-9.-]/g,''));
    const bn=parseFloat(String(bv).replace(/[^0-9.-]/g,''));
    let cmp;
    if(!isNaN(an)&&!isNaN(bn)&&String(av).match(/\d/)&&String(bv).match(/\d/)){
      cmp=an-bn;
    } else {
      cmp=String(av).localeCompare(String(bv));
    }
    return sortDir==='asc'?cmp:-cmp;
  });

  const handleSort=(idx)=>{
    if(sortCol===idx){setSortDir(d=>d==='asc'?'desc':'asc');}
    else{setSortCol(idx);setSortDir('asc');}
  };

  const bc=r=>r==='High'?'bg-red':r==='Medium'?'bg-amber':r==='Low'?'bg-green':'';

  return(
    <div>
      <div style={{display:'flex',gap:10,marginBottom:12,alignItems:'center'}}>
        <input
          className="table-search"
          style={{marginBottom:0,flex:1}}
          placeholder="🔍 Search by ID, department, diagnosis..."
          value={query}
          onChange={e=>setQuery(e.target.value)}
        />
        {query&&<span style={{fontSize:11,color:'#64748b',whiteSpace:'nowrap'}}>{sorted.length} of {rows.length} results</span>}
      </div>
      <div style={{overflowX:'auto'}}>
        <table className="data-table">
          <thead>
            <tr>
              {columns.map((c,i)=>(
                <th key={i} onClick={()=>handleSort(i)} style={{cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}}>
                  {c} {sortCol===i?(sortDir==='asc'?'▲':'▼'):<span style={{opacity:.25}}>⇅</span>}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sorted.map((r,i)=>(
              <tr key={i}>
                {r.map((cell,ci)=>(
                  <td key={ci}>
                    {ci===riskColIndex && bc(cell) ?
                      <span className={`badge ${bc(cell)}`}>{cell}</span> : cell}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
        {sorted.length===0 && <div style={{textAlign:'center',padding:20,color:'#94a3b8',fontSize:12}}>No matching records found.</div>}
      </div>
    </div>
  );
}

// ── RISK SCORE TABLE (search + sort) ──
function RiskScoreTable({rows}){
  const [query,setQuery]=useState('');
  const [sortCol,setSortCol]=useState(2);
  const [sortDir,setSortDir]=useState('desc');
  const filtered=rows.filter(r=>!query || String(r[0]).toLowerCase().includes(query.toLowerCase()) || String(r[1]).toLowerCase().includes(query.toLowerCase()));
  const sorted=[...filtered].sort((a,b)=>{
    const av=a[sortCol],bv=b[sortCol];
    let cmp = typeof av==='number' ? av-bv : String(av).localeCompare(String(bv));
    return sortDir==='asc'?cmp:-cmp;
  });
  const handleSort=(idx)=>{
    if(sortCol===idx){setSortDir(d=>d==='asc'?'desc':'asc');}
    else{setSortCol(idx);setSortDir('asc');}
  };
  const cols=['Patient ID','Dept','Risk Score','Age','Comorbidities','Prior Readmits'];
  return(
    <div>
      <input className="table-search" placeholder="🔍 Search by Patient ID or Department..." value={query} onChange={e=>setQuery(e.target.value)}/>
      <table className="data-table">
        <thead><tr>
          {cols.map((c,i)=>(
            <th key={i} onClick={()=>handleSort(i)} style={{cursor:'pointer',userSelect:'none'}}>
              {c} {sortCol===i?(sortDir==='asc'?'▲':'▼'):<span style={{opacity:.25}}>⇅</span>}
            </th>
          ))}
        </tr></thead>
        <tbody>
          {sorted.map((r,i)=>(
            <tr key={i}>
              <td>{r[0]}</td><td>{r[1]}</td>
              <td><span className={`badge ${r[2]>=70?'bg-red':r[2]>=40?'bg-amber':'bg-green'}`}>{r[2]}</span></td>
              <td>{r[3]}</td><td>{r[4]}</td><td>{r[5]}</td>
            </tr>
          ))}
        </tbody>
      </table>
      {sorted.length===0 && <div style={{textAlign:'center',padding:20,color:'#94a3b8',fontSize:12}}>No matching records found.</div>}
    </div>
  );
}

// ── MAIN APP ──
const PAGES=['Dashboard Overview','Controls & Settings','Discharge Details','Volume Over Time','Patient Flow (Sankey)','Project Information','Predictions & Insights'];

function App(){
  const [loggedIn,setLoggedIn]=useState(false);
  const [cur,setCur]=useState(0);
  const [dir,setDir]=useState('next'); // 'next' | 'prev' | 'dot'
  // ── SHARED REACT STATE (Controls → Dashboard live update) ──
  const [thresh,setThresh]=useState(70);
  const [stayAlert,setStayAlert]=useState(10);
  const [readWin,setReadWin]=useState(30);
  const N=PAGES.length;
  const date=new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});

  // Derived KPIs react to slider changes
  const highRisk=Math.round(47*(thresh/70));
  const extStay=Math.round(129*(10/stayAlert));
  const readRate=(13.7*(readWin/30)).toFixed(1);
  const placement=(100-parseFloat(readRate)).toFixed(1);

  const pageComponentNames=['PageDashboard','PageControls','PageDischarge','PageVolume','PageSankey','PageProjectInfo','PagePredictions'];

  // ── REACT COMPONENT TREE LOGGING ──
  useEffect(()=>{
    console.log('%c⚛️ React Component Tree Mounted','background:#7c3aed;color:#fff;padding:4px 10px;border-radius:4px;font-weight:bold;');
    console.log('%cApp\n├─ Sidebar\n├─ Topbar\n├─ <Page Components> (7 total)\n│   ├─ PageDashboard\n│   ├─ PageControls\n│   ├─ PageDischarge\n│   ├─ PageVolume\n│   ├─ PageSankey\n│   ├─ PageProjectInfo\n│   └─ PagePredictions\n└─ NavFooter','color:#0077b6;font-family:monospace;font-size:12px;');
    console.log('%cReact version:','font-weight:bold;color:#475569;', React.version);
    console.log('%cHooks in use:','font-weight:bold;color:#475569;', 'useState (6 instances), useEffect (3 instances), useRef (2 instances)');
  },[]);

  useEffect(()=>{
    console.log(
      `%c⚛️ Render → <${pageComponentNames[cur]}/>`,
      'background:#0077b6;color:#fff;padding:3px 8px;border-radius:4px;font-weight:bold;'
    );
    console.log('%cProps passed:','color:#94a3b8;font-size:11px;', {page:cur+1, title:PAGES[cur]});
  },[cur]);

  useEffect(()=>{
    console.log(
      '%c⚛️ State Update → useState(thresh, stayAlert, readWin)',
      'background:#7c3aed;color:#fff;padding:3px 8px;border-radius:4px;font-weight:bold;'
    );
    console.table({
      'High Risk Threshold': thresh,
      'Extended Stay Alert (days)': stayAlert,
      'Readmission Window (days)': readWin,
      'Derived: High Risk Count': highRisk,
      'Derived: Extended Stay Count': extStay,
      'Derived: Readmission Rate %': readRate,
    });
  },[thresh,stayAlert,readWin]);

  const pages=[
    <PageDashboard highRisk={highRisk} extStay={extStay} readRate={readRate} placement={placement} thresh={thresh}/>,
    <PageControls thresh={thresh} setThresh={setThresh} stayAlert={stayAlert} setStayAlert={setStayAlert} readWin={readWin} setReadWin={setReadWin} onApply={()=>{setDir('prev');setCur(0);}}/>,
    <PageDischarge/>,<PageVolume/>,<PageSankey/>,<PageProjectInfo/>,<PagePredictions/>
  ];

  if(!loggedIn)return <LoginPage onLogin={()=>{console.log('%c⚛️ Auth State → loggedIn: true','background:#16a34a;color:#fff;padding:3px 8px;border-radius:4px;font-weight:bold;');setLoggedIn(true);}}/>;
  return(
    <div className="shell">
      <Sidebar cur={cur} onNav={(i)=>{setDir(i>cur?'next':i<cur?'prev':'dot');setCur(i);}} onLogout={()=>{setLoggedIn(false);setCur(0);}}/>
      <div className="main-area">
        <div className="topbar">
          <div className="topbar-left">
            <span className="page-badge">PAGE {cur+1} / {N}</span>
            <span className="page-title-top">{PAGES[cur]}</span>
          </div>

              console.log('%cApp (root)','color:#7c3aed;font-weight:bold;');
              console.log('  └─ loggedIn:', loggedIn, '| cur:', cur);
              console.log('  └─ Sidebar [props: cur, onNav, onLogout]');
              console.log(`  └─ ${pageComponentNames[cur]} [active, rendering now]`);
              console.log('       └─ KPICard ×4 (reusable component)');

              console.log('%cClick sliders in Controls page and re-open console to see live state updates!','color:#16a34a;font-style:italic;');

    </div>
  );
}

</script>
